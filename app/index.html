<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
  <title>Abdeljabar.com - Full-Stack Developer & Domain Broker</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Dual expertise in full-stack development and digital strategy. Building scalable web apps and curating premium digital real estate." />
  <meta name="keywords"
    content="Full-Stack Developer, Web Development, Domain Broker, React, Node.js, Digital Strategy, Abdeljabar" />
  <meta name="author" content="Abdeljabar Bougrine" />
  <meta name="google-site-verification" content="gmoEIRk2vXws7EXXo9PwFi4fcAyRAS7x3P4hGULgXsg" />
  <meta name="msvalidate.01" content="4B6735A6E4277140A46146B428D25516" />
  
  <!-- Dynamic Canonical and Social Tags -->
  <script>
    (function() {
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      const fullUrl = 'https://abdeljabar.com' + (path === '/' ? '/' : path);
      
      const setTag = (selector, attr, val, createTag) => {
        let el = document.querySelector(selector);
        if (!el && createTag) {
          el = document.createElement(createTag.tag);
          Object.entries(createTag.attrs).forEach(([k, v]) => el.setAttribute(k, v));
          document.head.appendChild(el);
        }
        if (el) el.setAttribute(attr, val);
      };

      setTag('link[rel="canonical"]', 'href', fullUrl, { tag: 'link', attrs: { rel: 'canonical' } });
      setTag('meta[property="og:url"]', 'content', fullUrl, { tag: 'meta', attrs: { property: 'og:url' } });
      setTag('meta[property="twitter:url"]', 'content', fullUrl, { tag: 'meta', attrs: { property: 'twitter:url' } });
    })();
  </script>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Abdeljabar.com - Full-Stack Developer & Domain Broker" />
  <meta property="og:description"
    content="Dual expertise in full-stack development and digital strategy. Building scalable web apps and curating premium digital real estate." />
  <meta property="og:image" content="https://abdeljabar.com/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Abdeljabar.com - Full-Stack Developer & Domain Broker" />
  <meta property="twitter:description"
    content="Dual expertise in full-stack development and digital strategy. Building scalable web apps and curating premium digital real estate." />
  <meta property="twitter:image" content="https://abdeljabar.com/og-image.png" />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
