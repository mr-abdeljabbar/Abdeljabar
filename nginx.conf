server {
    listen 80;
    server_name localhost;
    absolute_redirect off; # Prevent redirects to http behind proxy

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router's client-side routing
        # Redirect URLs with trailing slashes to non-trailing slash version
        # Use .+ to ensure it doesn't match the root /
        rewrite ^/(.+)/$ /$1 permanent;
        
        try_files $uri $uri/ /index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 404 /index.html;
}

